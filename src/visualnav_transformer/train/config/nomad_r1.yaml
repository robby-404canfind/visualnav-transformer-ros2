project_name: nomad_r1
run_name: nomad_r1_finetune

# Fine-tuning setup for the r1 rectangular-track simulator dataset.
# Start from the pretrained NoMaD checkpoint copied to logs/pretrained_nomad/latest.pth.
load_run: pretrained_nomad
use_wandb: False
train: True
batch_size: 32
eval_batch_size: 32
epochs: 20
gpu_ids: [0]
num_workers: 4
lr: 1e-5
optimizer: adamw
clipping: False
max_norm: 1.
scheduler: "cosine"
warmup: True
warmup_epochs: 2
cyclic_period: 10
plateau_patience: 3
plateau_factor: 0.5
seed: 0

# Model params: keep identical to pretrained nomad.pth.
model_type: nomad
vision_encoder: nomad_vint
encoding_size: 256
obs_encoder: efficientnet-b0
attn_unet: False
cond_predict_scale: False
mha_num_attention_heads: 4
mha_num_attention_layers: 4
mha_ff_dim_factor: 4
down_dims: [64, 128, 256]
num_diffusion_iters: 10
goal_mask_prob: 0.5
normalize: True
context_type: temporal
context_size: 3
alpha: 1e-4

distance:
  min_dist_cat: 0
  max_dist_cat: 20
action:
  min_dist_cat: 3
  max_dist_cat: 20

len_traj_pred: 8
learn_angle: False
image_size: [96, 96]

datasets:
  r1_track:
    data_folder: /visualnav-transformer/datasets/r1_track
    train: /visualnav-transformer/data_splits/r1_track/train/
    test: /visualnav-transformer/data_splits/r1_track/test/
    waypoint_spacing: 1
    end_slack: 3
    goals_per_obs: 1
    negative_mining: True

print_log_freq: 20
image_log_freq: 200
num_images_log: 8
pairwise_test_freq: 0
eval_fraction: 0.25
wandb_log_freq: 10
eval_freq: 1
